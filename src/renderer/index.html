<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xbox IDE</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="../../node_modules/xterm/css/xterm.css">
</head>
<body>
    <div id="app">
        <div id="tab-bar"><div id="tab-container"></div></div>
        <div id="main">
            <div id="sidebar">
                <div id="sidebar-tabs">
                    <span class="st-panel-tab active" data-sidebar="explorer">EXPLORER</span>
                    <span class="st-panel-tab" data-sidebar="git">GIT</span>
                    <span class="st-panel-tab" data-sidebar="extensions">EXTENSIONS</span>
                </div>
                <div id="sidebar-content">
                    <div id="explorer-panel" class="sidebar-panel">
                        <div id="file-tree"></div>
                    </div>
                    <div id="git-panel" class="sidebar-panel hidden">
                        <div id="git-header">
                            <span id="git-branch">main</span>
                            <button id="git-refresh-btn" class="sidebar-btn">↻</button>
                        </div>
                        <div id="git-commit-row">
                            <input id="git-commit-input" placeholder="Commit message...">
                            <button id="git-commit-btn" class="sidebar-btn">✓</button>
                        </div>
                        <div id="git-panel-tabs">
                            <span class="gp-tab active" data-gp="changes">Changes</span>
                            <span class="gp-tab" data-gp="branches">Branches</span>
                            <span class="gp-tab" data-gp="commits">Commits</span>
                        </div>
                        <div id="git-changes" class="gp-content">
                            <div id="git-status-list"></div>
                        </div>
                        <div id="git-branches" class="gp-content hidden"></div>
                        <div id="git-diff-view" class="gp-content hidden"></div>
                    </div>
                    <div id="extensions-panel" class="sidebar-panel hidden">
                        <div id="ext-header">
                            <button id="ext-load-btn" class="sidebar-btn">Load</button>
                        </div>
                        <div id="ext-list"></div>
                    </div>
                </div>
            </div>
            <div id="editor-area">
                <div id="editor-container"></div>
            </div>
            <div id="right-panel">
                <div id="minimap-header">OUTLINE</div>
                <div id="minimap-content"></div>
            </div>
        </div>
        <div id="panel-area">
            <div id="panel-tabs">
                <span class="panel-tab active" data-panel="terminal">TERMINAL</span>
                <span class="panel-tab" data-panel="problems">PROBLEMS</span>
            </div>
            <div id="panel-content"></div>
        </div>
        <div id="status-bar">
            <span id="status-left"></span>
            <span id="status-right">
                <span id="status-cursor">Ln 1, Col 1</span>
                <span id="status-lang">JavaScript</span>
                <span id="status-ctrl">🎮</span>
            </span>
        </div>
    </div>

    <div id="find-overlay" class="overlay hidden">
        <div id="find-panel">
            <div id="find-header">
                <span id="find-toggle-replace">Replace</span>
                <span id="find-close-btn">✕</span>
            </div>
            <input id="find-input" placeholder="Find...">
            <span id="find-match-count"></span>
            <div id="find-actions">
                <button id="find-prev-btn">▲</button>
                <button id="find-next-btn">▼</button>
                <button id="find-replace-btn" title="Replace">Replace</button>
                <button id="find-replace-all-btn" title="Replace All">All</button>
            </div>
            <div id="find-replace-row">
                <input id="replace-input" placeholder="Replace...">
            </div>
        </div>
    </div>

    <div id="command-palette-overlay" class="overlay hidden">
        <div id="command-palette">
            <div id="cp-header">Command Palette</div>
            <input id="cp-input" placeholder="Type a command...">
            <div id="cp-list"></div>
        </div>
    </div>

    <div id="settings-overlay" class="overlay hidden">
        <div id="settings-panel">
            <div id="settings-header">Settings <span id="settings-close">✕</span></div>
            <div id="settings-body"></div>
        </div>
    </div>

    <div id="keyboard-overlay" class="overlay hidden">
        <div id="keyboard-panel">
            <div id="kbd-header">On-Screen Keyboard <span id="kbd-layer-name">ABC</span></div>
            <div id="kbd-grid"></div>
            <div id="kbd-suggestions"></div>
        </div>
    </div>

    <div id="mouse-blocker"></div>

    <div id="notification-container"></div>

    <script src="../../node_modules/xterm/lib/xterm.js"></script>
    <script src="../../node_modules/xterm-addon-fit/lib/xterm-addon-fit.js"></script>
    <script src="../../node_modules/monaco-editor/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { vs: '../../node_modules/monaco-editor/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            window.__monacoReady = true;
            const script = document.createElement('script');
            script.type = 'module';
            script.src = 'app.mjs';
            document.body.appendChild(script);
        });
    </script>
</body>
</html>
